<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body{
            background: #ccc;
        }

        #calculator{
            position: relative;
            border-radius: 10px;
            margin: auto;
            margin-top: 75px;
            display: block;
            height: auto;
            width: 278px;
            background-color: rgb(255, 255, 255);
            font-size: 0.8cm;
            padding: 5px;
            max-width: 400px;
        }

        .ac-button{
            color: red;
        }

        .delete{
            color: red;
        }

        .divide{
            color: red;
        }

        .multiply{
            color: red;
        }

        .sub{
            color: red;
        }

        .plus{
            color: red;
        }

        .equal{
            color: red;
        }

        #result{
            width: 100%;
            padding: 15px 0px;
            text-align: right;
            font-size: 1.7em;
            font-family: "Oxygen Mono",monospace;
            background: inherit;
            color: black;
        }

        button{
            width: 55px;
            height: 50px;
            margin:4px 2px;
            outline:none;
            border:none;
            background: rgb(223, 223, 223);
            color: rgb(67, 128, 221);
            border-radius: 5px;
            font-size: 1em;
        }

    </style>
</head>

<body>
    <div id="calculator">
        <div id="result">0</div>
        <button class="ac-button" onclick="clearForm()">AC</button>
        <button class="delete" onclick="deleteForm()"> del</button>
        <button onclick="getNumber(this)">%</button>
        <button class="divide" onclick="getNumber(this)">/</button>

        <button onclick="getNumber(this)">7</button>
        <button onclick="getNumber(this)">8</button>
        <button onclick="getNumber(this)">9</button>
        <button class="multiply" onclick="getNumber(this)">*</button>

        <button onclick="getNumber(this)">4</button>
        <button onclick="getNumber(this)">5</button>
        <button onclick="getNumber(this)">6</button>
        <button  class="sub" onclick="getNumber(this)">-</button>

        <button onclick="getNumber(this)">1</button>
        <button onclick="getNumber(this)">2</button>
        <button onclick="getNumber(this)">3</button>
        <button class="plus" onclick="getNumber(this)">+</button>

        <button onclick="getNumber(this)">(</button>
        <button onclick="getNumber(this)">)</button>
        <button onclick="getNumber(this)">0</button>
        <button onclick="getNumber(this)">.</button>
        <button class="equal" onclick="getNumber(this)">=</button>
    </div>
</body>

<script src="phoneCalculator.js"></script>
</html>
